<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User manage</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            {% include "partials/navbar.html" %}
        <div class="col-md-10 p-4">
            <div class='d-flex align-items-center mb-3 '>
                 <h1>User Management</h1>
                <button class="btn btn-secondary ml-auto"><i class="fas fa-user-shield mr-2"></i>Admin</button>
            </div >
        <div class="d-flex align-items-center mb-4">
            <i class="fa-solid fa-magnifying-glass mr-2 "></i>
            <input class="form-control border-light" type="text" placeholder="Search users...">
        </div>
        <div class="table-responsive mt-3">
            <table class="table table-bordered table-hover ">
                <thead class="thead-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Profile</th>
                    </tr>
                </thead>
                {%for users in user_list%}
                <tbody>
                    <tr>
                        <td>{{users.id}}</td>
                        <td>{{users.name}}</td>
                        <td>{{users.email}}</td>
                        <td><a href="{% url 'userprofile' users.id %}">View Profile</a></td>
                    </tr>
                     {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            {% include "partials/navbar.html" %}
            <div class="col-md-10 p-4">
                <div class='d-flex align-items-center mb-3 '>
                    <h1>Reports</h1>
                    <button class="btn btn-secondary ml-auto"><i class="fas fa-user-shield mr-2"></i>Admin</button>
                </div >
                <div class="d-flex align-items-center mt-3 mb-3">
                    <h4>Most Viewed Doctor</h4>
                    <div class="ml-auto d-flex align-items-center">
                        <label class="mb-0 mr-2">Select Month</label>
                        <input type="month" class="form-control w-auto" value="2026-03">
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="thead-dark">
                            <tr>
                                <th>Rank</th>
                                <th>Doctor</th>
                                <th>Views</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Dr Arjun</td>
                                <td>42</td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Dr Ansila</td>
                                <td>29</td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>Dr Riya</td>
                                <td>20</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            {% include "partials/navbar.html" %}
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="mb-0">Reports</h1>
                    <button class="btn btn-secondary"><i class="fas fa-user-shield mr-2"></i>Admin</button>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Most Viewed Doctor</h4>
                    <form method="GET" class="d-flex align-items-end" style="gap:10px;">
                        <div>
                            <label class="mb-1">Select Month</label>
                            <input type="month" name="month" class="form-control" value="{{ request.GET.month }}">
                        </div>
                        <button class="btn btn-primary mb-1">
                            <i class="fas fa-search mr-1"></i>Search
                        </button>
                    </form>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="thead-dark">
                            <tr>
                                <th>Rank</th>
                                <th>Doctor</th>
                                <th>Views</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in data %}
                            <tr>
                                <td>{{ forloop.counter }}</td>
                                <td>{{ item.doctor__name }}</td>
                                <td>{{ item.total }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</html>

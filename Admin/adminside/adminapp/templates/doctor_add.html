<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor</title>
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 


</head>
<body>
    <div class="container-fluid">
        <div class="row">
            {% include "partials/navbar.html" %}
            <div class="col-md-10 p-4">
                <div class='d-flex align-items-center mb-4'>
                    <h1>Add Doctor</D></h1>
                    <button class="btn btn-secondary ml-auto"><i class="fas fa-user-shield mr-2"></i>Admin</button>
                </div>  
                <form>
                    <div class="from-group">
                    <label>Doctor Name:</label>
                    <input type="text" class='form-control'placeholder="Enter doctor's name">
                    </div>
                    <div class="form-group mt-3">
                        <label>Profile Photo</label>
                       <input type="file" class="form-control" >
                    </div>
                    <div class="form-group">
                    <label>Specialization</label>
                    <select class="form-control">
                        <option>General Physician</option>
                        <option>Cardiology</option>
                        <option>Dermatology</option>
                        <option>Neurology</option>
                        <option>Pediatrics</option>
                        <option>Orthopedics</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" placeholder="Enter email address">
                    </div>
                    <div class="form-group">
                        <label>qualification</label>
                        <input type="text" placeholder="Entert qualification" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Years of Experience</label>
                        <select class="form-control">
                            <option>Choose year of experience</option>
                            <option>1-2 years</option>
                            <option>3-5 years</option>
                            <option>6-10 years</option>
                            <option>11-15 years</option>
                            <option>15-20 years</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk mr-2" ></i>Save</button>
                        <button class="btn btn-danger"><i class="fas fa-times mr-2"></i>Cancel</button>
                    </div>
                </form>  
        </div>
    </div>
    
</body>
</html>
